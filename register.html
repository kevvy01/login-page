<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevvy - Create Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
        /* (PASTE CSS ANTIGRAVITY KAMU DI SINI, SAYA TULIS BEBERAPA TAMBAHAN KECIL DI BAWAH) */
            *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --obsidian: #05070a;
      --charcoal: #0f1117;
      --surface: #13161e;
      --border: rgba(0, 255, 230, 0.10);
      --cyan: #00ffe6;
      --cyan-dim: rgba(0, 255, 230, 0.18);
      --cyan-glow: rgba(0, 255, 230, 0.45);
      --text: #e8eaf0;
      --muted: rgba(232, 234, 240, 0.45);
      --error: #ff4d6d;
    }

    html,
    body {
      height: 100%;
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      background: var(--obsidian);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Radial ambient glow ── */
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .ambient-cyan {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0, 255, 230, 0.08) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      animation: floatA 12s ease-in-out infinite alternate;
    }

    .ambient-blue {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(80, 80, 255, 0.07) 0%, transparent 70%);
      bottom: -150px;
      left: -150px;
      animation: floatB 15s ease-in-out infinite alternate;
    }

    @keyframes floatA {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(40px, 60px);
      }
    }

    @keyframes floatB {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(-30px, -50px);
      }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Brand watermark top-left ── */
    .brand-mark {
      position: fixed;
      top: 32px;
      left: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--cyan);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px var(--cyan-glow), inset 0 0 8px rgba(0, 255, 230, 0.08);
      animation: pulseIcon 3s ease-in-out infinite;
    }

    @keyframes pulseIcon {

      0%,
      100% {
        box-shadow: 0 0 16px var(--cyan-glow), inset 0 0 8px rgba(0, 255, 230, 0.08);
      }

      50% {
        box-shadow: 0 0 28px var(--cyan-glow), inset 0 0 14px rgba(0, 255, 230, 0.15);
      }
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--cyan);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text);
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(13, 16, 22, 0.55);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px 44px;
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow:
        0 0 0 0.5px rgba(0, 255, 230, 0.06),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 32px 80px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(32px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* inner top glow line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.6;
    }

    /* bottom corner reflections */
    .card::after {
      content: '';
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(0, 255, 230, 0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Header ── */
    .card-header {
      margin-bottom: 36px;
      text-align: center;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cyan-dim);
      border: 1px solid rgba(0, 255, 230, 0.22);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .card-badge span.dot {
      width: 5px;
      height: 5px;
      background: var(--cyan);
      border-radius: 50%;
      animation: blink 2s steps(1) infinite;
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1
      }

      50%,
      100% {
        opacity: 0
      }
    }

    .card-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }

    /* ── Social OAuth buttons ── */
    .oauth-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .oauth-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      font-family: inherit;
    }

    .oauth-btn:hover {
      background: rgba(0, 255, 230, 0.05);
      border-color: rgba(0, 255, 230, 0.22);
      transform: translateY(-1px);
    }

    .oauth-btn:active {
      transform: translateY(0);
    }

    .oauth-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Form ── */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      position: relative;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      transition: color 0.2s;
    }

    .field:focus-within label {
      color: var(--cyan);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      color: var(--muted);
      transition: color 0.2s;
      pointer-events: none;
    }

    .field:focus-within .input-icon {
      color: var(--cyan);
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      letter-spacing: 0.01em;
    }

    input::placeholder {
      color: rgba(232, 234, 240, 0.25);
    }

    input:focus {
      border-color: rgba(0, 255, 230, 0.45);
      background: rgba(0, 255, 230, 0.04);
      box-shadow: 0 0 0 3px rgba(0, 255, 230, 0.08);
    }

    input.error {
      border-color: rgba(255, 77, 109, 0.55);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: var(--cyan);
    }

    .toggle-pw svg {
      width: 15px;
      height: 15px;
    }

    .field-error {
      font-size: 11px;
      color: var(--error);
      margin-top: 6px;
      padding-left: 2px;
      display: none;
    }

    .field-error.show {
      display: block;
    }

    /* ── Remember + forgot row ── */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: -4px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
    }

    .remember input[type="checkbox"] {
      display: none;
    }

    .checkmark {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .remember input:checked+.checkmark {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .checkmark svg {
      width: 10px;
      height: 10px;
      stroke: #05070a;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .remember input:checked+.checkmark svg {
      opacity: 1;
    }

    .forgot {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.01em;
    }

    .forgot:hover {
      color: var(--cyan);
    }

    /* ── Primary CTA ── */
    .btn-primary {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, rgba(0, 255, 230, 0.92) 0%, rgba(0, 200, 180, 0.88) 100%);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #05070a;
      font-family: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.25s;
      box-shadow: 0 0 24px rgba(0, 255, 230, 0.25), 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 36px rgba(0, 255, 230, 0.38), 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary.loading {
      pointer-events: none;
    }

    .btn-primary .btn-text {
      transition: opacity 0.2s;
    }

    .btn-primary .spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary.loading .btn-text {
      opacity: 0;
    }

    .btn-primary.loading .spinner {
      opacity: 1;
    }

    .spinner svg {
      width: 20px;
      height: 20px;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .card-footer a:hover {
      opacity: 0.75;
    }

    /* ── Mouse-tracking tilt ── */
    .card {
      transform-style: preserve-3d;
    }

    /* ── Cursor glow ── */
    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      pointer-events: none;
      background: radial-gradient(circle, rgba(0, 255, 230, 0.04) 0%, transparent 70%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      transition: opacity 0.3s;
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: screen;
    }

    .orb1 {
      width: 6px;
      height: 6px;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      top: 20%;
      left: 15%;
      animation: orbFloat1 8s ease-in-out infinite;
    }

    .orb2 {
      width: 4px;
      height: 4px;
      background: rgba(80, 140, 255, 0.9);
      box-shadow: 0 0 10px rgba(80, 140, 255, 0.9);
      top: 60%;
      right: 18%;
      animation: orbFloat2 11s ease-in-out infinite;
    }

    .orb3 {
      width: 3px;
      height: 3px;
      background: var(--cyan);
      top: 80%;
      left: 35%;
      animation: orbFloat3 9s ease-in-out infinite;
    }

    @keyframes orbFloat1 {

      0%,
      100% {
        transform: translate(0, 0);
        opacity: 0.7;
      }

      33% {
        transform: translate(20px, -30px);
        opacity: 1;
      }

      66% {
        transform: translate(-10px, 20px);
        opacity: 0.5;
      }
    }

    @keyframes orbFloat2 {

      0%,
      100% {
        transform: translate(0, 0);
        opacity: 0.6;
      }

      50% {
        transform: translate(-25px, 15px);
        opacity: 1;
      }
    }

    @keyframes orbFloat3 {

      0%,
      100% {
        transform: translate(0, 0);
        opacity: 0.5;
      }

      40% {
        transform: translate(15px, -20px);
        opacity: 0.9;
      }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card {
        padding: 36px 28px 32px;
      }

      .card-title {
        font-size: 22px;
      }

      .brand-mark {
        top: 20px;
        left: 20px;
      }
    }
        /* Tambahan untuk menyesuaikan form registrasi */
        .card-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }
        .card-footer a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .card-footer a:hover { opacity: 0.75; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient ambient-cyan"></div>
    <div class="ambient ambient-blue"></div>
    <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="brand-mark">
        <div class="brand-icon">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 1 L15 5.5 L15 10.5 L8 15 L1 10.5 L1 5.5 Z" fill="none" stroke="currentColor" stroke-width="1.2"
              style="fill:none;stroke:#00ffe6;" />
            <circle cx="8" cy="8" r="2.2" fill="#00ffe6" />
          </svg>
        </div>
        <div class="brand-name">Kevvy</div>
    </div>

    <div class="page">
        <div class="card" id="registerCard">
            
            <div class="card-header">
                <div class="card-badge"><span class="dot"></span>NEW PILOT</div>
                <h1 class="card-title">Join Orbit</h1>
                <p class="card-subtitle">Create your trajectory credentials.</p>
            </div>

            <form id="registerForm" class="form">
                <div class="field">
                    <label>Identity (Email)</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="regEmail" placeholder="1234567@gmail.com" required>
                    </div>
                </div>

                <div class="field">
                    <label>Access Key (Min 8 Chars)</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="regPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="regBtn">
                    <span class="btn-text">Initiate Launch Sequence</span>
                    <span class="spinner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32"></circle></svg></span>
                </button>
            </form>

            <div class="card-footer">
                Already registered? <a href="index.html">Return to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Supabase Logic
        const SUPABASE_URL = 'https://fipksnkvvwbshesxmxbh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpcGtzbmt2dndic2hlc3hteGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTY5NzMsImV4cCI6MjA5MTg5Mjk3M30.Ap-ekfy71YU_Oggj6mm6tIuoDFUJuR-pPHtDbFG9n10';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('registerForm');
        const regBtn = document.getElementById('regBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            regBtn.classList.add('loading');

            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
            });

            regBtn.classList.remove('loading');

            if (error) {
                alert("Launch Failed: " + error.message);
            } else {
                alert("Credentials Accepted! You may now login.");
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
